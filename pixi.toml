[workspace]
authors = ["Alexandre Bry <abry.pro@proton.me>"]
channels = ["conda-forge"]
name = "points2prints"
platforms = ["linux-64", "win-64", "osx-64", "osx-arm64"]
version = "0.1.0"

[feature.general.dependencies]
entwine = ">=3.2.1,<4"
duckdb = ">=1.5.2,<2"
gdal = ">=3.12.3,<4"
pdal = ">=2.10.0,<3"
pdal_wrench = ">=1.4.0,<2"

[feature.general.pypi-dependencies]
geoparquet-io = ">=0.8.0,<0.9"

[feature.python.dependencies]
python = ">=3.14.4,<3.15"
httpx = ">=0.28.1,<0.29"
pyproj = ">=3.7.2,<4"
tqdm = ">=4.67.3,<5"
typer = ">=0.24.1,<0.25"
matplotlib = ">=3.10.8,<4"
imageio-ffmpeg = ">=0.6.0,<0.7"
geopandas = ">=1.1.1,<2"
shapely = ">=2.1.1,<3"

[feature.python.pypi-dependencies]
fastquadtree = ">=2.1.1,<3"

[feature.python.tasks]
p2p-py = { cmd = "cd \"$INIT_CWD\" && PYTHONPATH=\"$PIXI_PROJECT_ROOT\" PYTHONNOUSERSITE=1 python -m src.points2prints.main", description = "Run a Python command with subcommands and arguments.\n\tYou can use `pixi run p2p-py --help` to get a list of available commands." }

[feature.cpp.dependencies]
cgal = ">=6.0.1,<7"
libarrow-all = ">=23.0.0,<24"
cmake = ">=4.3.2,<5"
doxygen = ">=1.13.2,<2"
eigen = ">=3.4.0,<4"

[feature.cpp.tasks]
p2p-cpp-clean = { cmd = "cd \"$INIT_CWD\" && rm -rf $PIXI_PROJECT_ROOT/cpp/build", cwd = "." }
p2p-cpp-cmake = { cmd = "cd \"$INIT_CWD\" && cmake -B $PIXI_PROJECT_ROOT/cpp/build/Release -S $PIXI_PROJECT_ROOT/cpp/ -D CMAKE_BUILD_TYPE=Release -Wno-dev" }
p2p-cpp-build = { cmd = "cd \"$INIT_CWD\" && cmake --build $PIXI_PROJECT_ROOT/cpp/build/Release", cwd = ".", depends-on = [
    "p2p-cpp-cmake",
] }
p2p-cpp-run-only = { cmd = "cd \"$INIT_CWD\" && $PIXI_PROJECT_ROOT/cpp/build/Release/executable/Points2Prints", cwd = "." }
p2p-cpp = { cmd = "cd \"$INIT_CWD\" && $PIXI_PROJECT_ROOT/cpp/build/Release/executable/Points2Prints", depends-on = [
    "p2p-cpp-build",
], description = "Run the C++ command with subcommands and arguments.\n\tYou can use `pixi run p2p-cpp --help` to get a list of available commands." }

[tasks]
traj-estimation = { cmd = "cd \"$INIT_CWD\" && $PIXI_PROJECT_ROOT/LiDARHD_Traj_Estimation/build/SensorLiDARHD", description = "Compute the trajectories of each flight line in a LAS/LAZ file." }

[environments]
default = ["general", "cpp", "python"]

[dependencies]
pip = ">=26.0.1,<27"
